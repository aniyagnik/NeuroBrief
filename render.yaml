# Render Blueprint — https://render.com/docs/blueprint-spec
# IMPORTANT: Runtime must be Docker (not Python). The UI is built inside the image.
services:
  - type: web
    name: neurobrief
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: HF_MODEL
        value: meta-llama/Meta-Llama-3-8B-Instruct
      - key: FLASK_DEBUG
        value: "0"
      - key: JOB_WORKERS
        value: "1"
      - key: LOG_LEVEL
        value: INFO
